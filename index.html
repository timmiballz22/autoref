<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body style="margin:0;background:#07070b;color:#ccc;font-family:system-ui,sans-serif;">
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>if(window.pdfjsLib)pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";</script>
    <!--
      WebLLM is distributed as an ES module. Load it at page-load time and expose
      it on window so the app never has to perform a runtime network import
      (which would otherwise fire on first model load). Uses a pinned version
      for reproducibility. No user data is transmitted by this request.
    -->
    <script type="module">
      try {
        const m = await import("https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.82/+esm");
        window.webllm = m;
        window.__webllmReady = true;
      } catch (e) {
        console.warn("WebLLM preload failed; will fall back to runtime import.", e);
        window.__webllmReady = false;
      }
    </script>
    
    <script type="text/babel" data-presets="react" src="./meow.jsx"></script>
  </body>
</html>
